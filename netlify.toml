[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Set these in the Netlify dashboard under Site settings → Environment variables:
#   AIRTABLE_TOKEN    — Personal access token from airtable.com/create/tokens
#   AIRTABLE_BASE_ID  — Base ID starting with "app", visible in the Airtable URL
